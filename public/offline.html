<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Altour Italy — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1917;
      color: #ffffff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .label {
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #0ea5e7;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 1.25rem;
    }
    h1 span {
      color: #0ea5e7;
      font-style: italic;
      font-weight: 300;
    }
    p {
      color: #a8a29e;
      font-size: 0.875rem;
      font-weight: 500;
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    button {
      background: #0ea5e7;
      color: #ffffff;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 1rem;
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0284c7; }
    button:active { transform: scale(0.97); }
    .footer {
      position: absolute;
      bottom: 2rem;
      font-size: 0.6rem;
      color: #57534e;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <img src="/altour-logo.png" alt="Altour Italy" />
  <p class="label">Connessione assente</p>
  <h1>Sei offline,<br /><span>per ora.</span></h1>
  <p>
    Le pagine già visitate sono disponibili in cache.
    Controlla la connessione e riprova.
  </p>
  <button onclick="window.location.reload()">Riprova</button>
  <p class="footer">Altour Italy · Esperienze nell'outdoor</p>
</body>
</html>
